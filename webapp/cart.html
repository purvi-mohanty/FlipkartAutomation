<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Flipkart - My Cart</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { background:#f1f3f6; }
    .cart-page { max-width:1100px; margin:20px auto; padding:0 15px; display:flex; gap:15px; }
    .cart-main { flex:1; }
    .cart-sidebar { width:310px; }
    .cart-box { background:#fff; border-radius:2px; margin-bottom:10px; }
    .cart-header { padding:15px 20px; border-bottom:1px solid #f0f0f0; font-size:18px; font-weight:500; color:#212121; }
    .cart-item { display:flex; gap:15px; padding:18px 20px; border-bottom:1px solid #f0f0f0; align-items:flex-start; }
    .cart-item img { width:96px; height:96px; object-fit:contain; border:1px solid #f0f0f0; }
    .cart-item-info { flex:1; }
    .cart-item-name { font-size:16px; color:#212121; margin-bottom:4px; }
    .cart-item-seller { font-size:12px; color:#878787; margin-bottom:8px; }
    .cart-item-price { font-size:18px; font-weight:700; color:#212121; }
    .cart-item-original { font-size:13px; color:#878787; text-decoration:line-through; margin-left:6px; }
    .cart-item-discount { font-size:13px; color:#388e3c; font-weight:600; margin-left:4px; }
    .qty-row { display:flex; align-items:center; gap:8px; margin-top:12px; }
    .qty-btn { width:32px; height:32px; border-radius:50%; border:1px solid #c2c2c2; background:#fff; font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
    .qty-btn:hover { background:#f0f0f0; }
    .qty-val { font-size:16px; min-width:24px; text-align:center; font-weight:500; }
    .remove-btn { color:#2874f0; font-size:14px; cursor:pointer; background:none; border:none; margin-left:16px; }
    .remove-btn:hover { text-decoration:underline; }
    .empty-msg { text-align:center; padding:60px 20px; }
    .empty-msg p { color:#878787; font-size:16px; margin-top:10px; }
    .empty-msg a { color:#2874f0; font-weight:700; text-decoration:none; }
    .summary-box { background:#fff; border-radius:2px; padding:20px; }
    .summary-title { font-size:13px; font-weight:700; color:#878787; text-transform:uppercase; letter-spacing:1px; padding-bottom:12px; border-bottom:1px solid #f0f0f0; margin-bottom:12px; }
    .summary-row { display:flex; justify-content:space-between; padding:7px 0; font-size:14px; color:#212121; }
    .summary-row.discount { color:#388e3c; }
    .summary-row.total { font-size:16px; font-weight:700; border-top:1px dashed #e0e0e0; margin-top:8px; padding-top:12px; }
    .summary-savings { color:#388e3c; font-size:13px; margin-top:8px; padding-top:8px; border-top:1px solid #f0f0f0; }
    .btn-checkout { background:#fb641b; color:#fff; width:100%; padding:14px; border:none; border-radius:2px; font-size:16px; font-weight:700; cursor:pointer; margin-top:16px; letter-spacing:.5px; }
    .btn-checkout:hover { background:#e05a18; }
    .secure-info { text-align:center; font-size:12px; color:#878787; margin-top:8px; }
    .cart-page-header { background:#2874f0; padding:10px 0; margin-bottom:0; }
    .cart-page-header-inner { max-width:1100px; margin:0 auto; padding:0 15px; display:flex; align-items:center; gap:30px; }
    .cart-page-header-inner .fk-logo { color:#fff; font-size:20px; font-weight:700; text-decoration:none; font-style:italic; }
    .cart-page-header-inner .fk-logo span { color:#FFD700; font-size:10px; font-weight:400; display:block; margin-top:-4px; }
  </style>
</head>
<body>

<div class="cart-page-header">
  <div class="cart-page-header-inner">
    <a href="index.html" class="fk-logo">Flipkart<span>Explore Plus</span></a>
    <div style="flex:1; max-width:500px; background:#fff; border-radius:2px; display:flex;">
      <input type="text" placeholder="Search for products" style="flex:1;border:none;padding:8px 12px;font-size:13px;outline:none;">
    </div>
    <a href="#" style="color:#fff;font-size:14px;">Login</a>
    <a href="cart.html" style="color:#fff;font-size:14px;">Cart <span id="cart-count-hdr" style="background:#FFD700;color:#212121;padding:1px 5px;border-radius:50%;font-weight:700;font-size:11px;">0</span></a>
  </div>
</div>

<div class="cart-page">
  <div class="cart-main">
    <div class="cart-box">
      <div class="cart-header">My Cart (<span id="item-count">0</span> items)</div>
      <div id="cart-items-container"></div>
      <div id="place-order-bar" style="display:none;padding:15px 20px;text-align:right;background:#f9f9f9;">
        <button class="btn-checkout" style="width:auto;padding:14px 40px;" onclick="window.location='checkout.html'">
          PLACE ORDER
        </button>
      </div>
    </div>
  </div>

  <div class="cart-sidebar">
    <div class="summary-box">
      <div class="summary-title">Price Details</div>
      <div id="summary-content"></div>
      <button class="btn-checkout" id="proceed-to-checkout" onclick="window.location='checkout.html'">
        PLACE ORDER
      </button>
      <div class="secure-info">&#128274; Safe and Secure Payments. Easy returns.</div>
    </div>
  </div>
</div>

<script>
  function getCart() { try { return JSON.parse(localStorage.getItem('fk_cart') || '[]'); } catch(e) { return []; } }
  function saveCart(c) { localStorage.setItem('fk_cart', JSON.stringify(c)); }
  function parsePrice(p) { return parseFloat(String(p).replace(/[^0-9.]/g,'')) || 0; }

  function renderCart() {
    var cart = getCart();
    var totalQty = cart.reduce(function(s,i){ return s+i.qty; }, 0);
    document.getElementById('item-count').textContent = totalQty;
    document.getElementById('cart-count-hdr').textContent = totalQty;

    var container = document.getElementById('cart-items-container');
    if (cart.length === 0) {
      container.innerHTML = '<div class="empty-msg"><div style="font-size:60px;">&#128722;</div><h3 style="font-size:20px;color:#212121;">Your cart is empty!</h3><p>Add items to it now.<br><a href="index.html">Shop now</a></p></div>';
      document.getElementById('summary-content').innerHTML = '<p style="color:#878787;font-size:13px;">No items in cart.</p>';
      document.getElementById('proceed-to-checkout').style.display = 'none';
      document.getElementById('place-order-bar').style.display = 'none';
      return;
    }

    var html = '', subtotal = 0, originalTotal = 0;
    cart.forEach(function(item, idx) {
      var price = parsePrice(item.price);
      var orig  = Math.round(price * 2.1);
      var total = price * item.qty;
      subtotal += total;
      originalTotal += orig * item.qty;
      html += '<div class="cart-item" id="row-'+idx+'">' +
        '<img src="'+item.img+'" alt="'+item.name+'">' +
        '<div class="cart-item-info">' +
          '<div class="cart-item-name">'+item.name+'</div>' +
          '<div class="cart-item-seller">Seller: RetailNet &#9733;&#9733;&#9733;&#9733;</div>' +
          '<div>' +
            '<span class="cart-item-price">'+item.price+'</span>' +
            '<span class="cart-item-original">&#8377;'+orig+'</span>' +
            '<span class="cart-item-discount">'+Math.round((1-price/orig)*100)+'% off</span>' +
          '</div>' +
          '<div class="qty-row">' +
            '<button class="qty-btn" onclick="changeQty('+idx+',-1)">&#8722;</button>' +
            '<span class="qty-val" id="qty-'+idx+'">'+item.qty+'</span>' +
            '<button class="qty-btn" onclick="changeQty('+idx+',1)">+</button>' +
            '<button class="remove-btn" onclick="removeItem('+idx+')">REMOVE</button>' +
          '</div>' +
        '</div>' +
        '<div style="font-weight:700;color:#212121;font-size:16px;min-width:80px;text-align:right;">&#8377;'+total.toLocaleString('en-IN')+'</div>' +
      '</div>';
    });
    container.innerHTML = html;

    var discount = originalTotal - subtotal;
    var delivery = subtotal > 500 ? 0 : 40;
    var total    = subtotal + delivery;

    document.getElementById('summary-content').innerHTML =
      '<div class="summary-row"><span>Price ('+totalQty+' item'+( totalQty>1?'s':'')+')</span><span>&#8377;'+originalTotal.toLocaleString('en-IN')+'</span></div>' +
      '<div class="summary-row discount"><span>Discount</span><span>- &#8377;'+discount.toLocaleString('en-IN')+'</span></div>' +
      '<div class="summary-row"><span>Delivery Charges</span><span>'+(delivery===0?'<span style="color:#388e3c;">FREE</span>':'&#8377;'+delivery)+'</span></div>' +
      '<div class="summary-row total"><span>Total Amount</span><span id="order-total">&#8377;'+total.toLocaleString('en-IN')+'</span></div>' +
      '<div class="summary-savings">You will save &#8377;'+discount.toLocaleString('en-IN')+' on this order</div>';

    document.getElementById('proceed-to-checkout').style.display = 'block';
    document.getElementById('place-order-bar').style.display = 'block';
  }

  function changeQty(idx, d) {
    var c = getCart(); c[idx].qty = Math.max(1, c[idx].qty + d);
    saveCart(c); renderCart();
  }
  function removeItem(idx) {
    var c = getCart(); c.splice(idx, 1);
    saveCart(c); renderCart();
  }
  renderCart();
</script>
</body>
</html>
